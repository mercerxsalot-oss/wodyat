<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PUGS — Leaderboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,400&display=swap" rel="stylesheet">
<style>

/* ═══════════════════════════════════════
   DESIGN TOKENS
═══════════════════════════════════════ */
:root {
  --ink:      #080910;
  --ink2:     #0c0e18;
  --ink3:     #10121e;
  --s1:       #14172a;
  --s2:       #191d30;
  --s3:       #1e2338;

  --b1: rgba(255,255,255,0.05);
  --b2: rgba(255,255,255,0.09);
  --b3: rgba(255,255,255,0.15);

  --text:     #dde3f4;
  --text2:    #7880a0;
  --text3:    #3a4060;

  --gold:     #e2b94a;
  --gold2:    rgba(226,185,74,0.12);
  --silver:   #9fb0cc;
  --bronze:   #b07848;

  --blue:     #5b7fff;
  --blue2:    rgba(91,127,255,0.10);
  --blue3:    rgba(91,127,255,0.04);

  --ease: cubic-bezier(.4,0,.2,1);
  --spring: cubic-bezier(.34,1.56,.64,1);
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }

body {
  background: var(--ink);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* noise overlay */
body::before {
  content:'';
  position:fixed; inset:0; z-index:0; pointer-events:none;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.022'/%3E%3C/svg%3E");
}

/* top glow */
body::after {
  content:'';
  position:fixed; top:-300px; left:50%; transform:translateX(-50%);
  width:1000px; height:600px; z-index:0; pointer-events:none;
  background: radial-gradient(ellipse at 50% 40%, rgba(91,127,255,0.07) 0%, transparent 65%);
}

.z { position:relative; z-index:1; }

/* ═══════════════════════════════════════
   TOPBAR
═══════════════════════════════════════ */
.topbar {
  position:sticky; top:0; z-index:200;
  border-bottom:1px solid var(--b1);
  background: rgba(8,9,16,0.82);
  backdrop-filter: blur(24px) saturate(1.6);
}
.topbar-inner {
  max-width:1100px; margin:0 auto; padding:0 36px;
  height:60px; display:flex; align-items:center; justify-content:space-between;
}

.brand {
  display:flex; align-items:center; gap:12px;
  text-decoration:none;
}
.brand-mark {
  width:32px; height:32px; flex-shrink:0;
  background:var(--blue); clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
  display:flex; align-items:center; justify-content:center;
}
.brand-mark svg { width:14px; height:14px; fill:#fff; }
.brand-name {
  font-family:'Syne',sans-serif; font-weight:800;
  font-size:15px; letter-spacing:.14em; text-transform:uppercase; color:var(--text);
}
.brand-name em { font-style:normal; color:var(--blue); }

.topbar-right { display:flex; align-items:center; gap:8px; }

.chip {
  display:flex; align-items:center; gap:6px;
  padding:5px 11px; border:1px solid var(--b2);
  font-size:10px; font-weight:500; letter-spacing:.14em; text-transform:uppercase;
  color:var(--text2); background:transparent;
  font-family:'DM Sans',sans-serif; cursor:pointer;
  transition: border-color .18s var(--ease), color .18s var(--ease), background .18s var(--ease);
}
.chip:hover { border-color:var(--b3); color:var(--text); }
.chip.active { background:var(--blue); border-color:var(--blue); color:#fff; }
.chip.danger  { color:#e05; border-color:rgba(238,0,85,.3); }
.chip.danger:hover { background:rgba(238,0,85,.08); }

.live-dot {
  width:5px; height:5px; border-radius:50%; background:var(--blue);
  box-shadow:0 0 8px var(--blue);
  animation: blink 2.4s ease-in-out infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

/* ═══════════════════════════════════════
   ADMIN BAR
═══════════════════════════════════════ */
.admin-bar {
  border-bottom:1px solid rgba(91,127,255,.12);
  background: rgba(91,127,255,.04);
  overflow:hidden;
  max-height:0; opacity:0;
  transition: max-height .4s var(--ease), opacity .3s var(--ease), padding .3s var(--ease);
}
.admin-bar.open { max-height:200px; opacity:1; }

.admin-bar-inner {
  max-width:1100px; margin:0 auto; padding:16px 36px;
  display:flex; flex-direction:column; gap:10px;
}

.admin-section-label {
  font-size:9px; font-weight:600; letter-spacing:.22em; text-transform:uppercase;
  color:var(--blue); margin-bottom:2px;
}

.admin-row { display:flex; flex-wrap:wrap; gap:8px; align-items:center; }

.afield {
  display:flex; align-items:center; gap:6px; flex:1; min-width:200px;
}
.afield label {
  font-size:10px; font-weight:500; letter-spacing:.1em; text-transform:uppercase;
  color:var(--text2); white-space:nowrap; flex-shrink:0;
}
.ainput {
  flex:1; background:var(--s1); border:1px solid var(--b2);
  color:var(--text); font-family:'DM Sans',sans-serif;
  font-size:12px; padding:7px 10px; outline:none;
  transition:border-color .15s;
}
.ainput:focus { border-color:rgba(91,127,255,.5); }
.ainput::placeholder { color:var(--text3); }

input[type=range].slider {
  -webkit-appearance:none; appearance:none;
  width:90px; height:3px; background:var(--b2);
  outline:none; cursor:pointer;
  transition:background .15s;
}
input[type=range].slider::-webkit-slider-thumb {
  -webkit-appearance:none; width:14px; height:14px;
  border-radius:50%; background:var(--blue); cursor:pointer;
  box-shadow:0 0 0 3px rgba(91,127,255,.2);
}
.slider-val {
  font-size:11px; color:var(--text2); min-width:28px; text-align:right;
}

.btn-save {
  padding:7px 16px; background:var(--blue); color:#fff; border:none;
  font-family:'DM Sans',sans-serif; font-size:10px; font-weight:600;
  letter-spacing:.14em; text-transform:uppercase; cursor:pointer;
  transition:opacity .15s; flex-shrink:0;
}
.btn-save:hover { opacity:.82; }
.btn-save:active { opacity:.65; }

/* ═══════════════════════════════════════
   PAGE WRAP
═══════════════════════════════════════ */
.wrap { max-width:1100px; margin:0 auto; padding:52px 36px 80px; }

/* ═══════════════════════════════════════
   SECTION HEAD
═══════════════════════════════════════ */
.section-head {
  display:flex; align-items:center; gap:14px; margin-bottom:20px;
}
.section-title {
  font-size:9px; font-weight:600; letter-spacing:.26em; text-transform:uppercase;
  color:var(--text3); white-space:nowrap;
}
.section-line { flex:1; height:1px; background:var(--b1); }

/* ═══════════════════════════════════════
   LEAGUE GRID
═══════════════════════════════════════ */
#leagueGrid {
  display:grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap:10px;
  margin-bottom:60px;
}

.league-card {
  background:var(--s1); border:1px solid var(--b1);
  padding:28px 14px 22px;
  display:flex; flex-direction:column; align-items:center; gap:14px;
  cursor:pointer; outline:none;
  position:relative; overflow:hidden;
  transition: background .22s var(--ease), border-color .22s var(--ease), transform .22s var(--spring);
}
.league-card::after {
  content:''; position:absolute; top:0; left:0; right:0; height:1.5px;
  background:linear-gradient(90deg,transparent,var(--blue),transparent);
  transform:scaleX(0); transform-origin:center;
  transition:transform .3s var(--ease);
}
.league-card:hover { background:var(--s2); border-color:var(--b2); transform:translateY(-2px); }
.league-card:hover::after { transform:scaleX(1); }
.league-card.active { background:var(--blue3); border-color:rgba(91,127,255,.28); }
.league-card.active::after { transform:scaleX(1); background:var(--blue); }

.lc-logo {
  border-radius:50%; background:var(--ink3); border:1.5px solid var(--b2);
  display:flex; align-items:center; justify-content:center; overflow:hidden;
  flex-shrink:0; transition:border-color .22s;
}
.league-card.active .lc-logo { border-color:rgba(91,127,255,.45); }
.lc-logo img { width:100%; height:100%; object-fit:cover; display:block; }
.lc-init {
  font-family:'Syne',sans-serif; font-weight:700; color:var(--text3);
  text-transform:uppercase;
}
.lc-name {
  font-family:'Syne',sans-serif; font-weight:700; font-size:13px;
  letter-spacing:.05em; text-transform:uppercase; text-align:center;
  color:var(--text); line-height:1.25;
}
.lc-meta { font-size:10px; color:var(--text3); letter-spacing:.06em; }

/* skeleton cards */
.lc-skel {
  background:var(--s1); border:1px solid var(--b1); height:158px;
  animation:skelPulse 1.6s ease-in-out infinite;
}
@keyframes skelPulse { 0%,100%{opacity:.35} 50%{opacity:.65} }

/* ═══════════════════════════════════════
   BOARD PANEL
═══════════════════════════════════════ */
#boardPanel {
  opacity:0; transform:translateY(10px);
  transition:opacity .35s var(--ease), transform .35s var(--ease);
  pointer-events:none;
}
#boardPanel.visible { opacity:1; transform:translateY(0); pointer-events:all; }

/* league hero */
.lhero {
  display:flex; align-items:center; gap:22px;
  padding-bottom:28px; margin-bottom:28px;
  border-bottom:1px solid var(--b1);
}
.lhero-logo {
  border-radius:50%; background:var(--ink3); border:1.5px solid var(--b2);
  display:flex; align-items:center; justify-content:center; overflow:hidden; flex-shrink:0;
}
.lhero-logo img { width:100%; height:100%; object-fit:cover; }
.lhero-init { font-family:'Syne',sans-serif; font-weight:700; color:var(--text3); text-transform:uppercase; }

.lhero-info { flex:1; }
.lhero-name {
  font-family:'Syne',sans-serif; font-weight:800;
  font-size:clamp(32px,5vw,54px); letter-spacing:.03em;
  line-height:1; text-transform:uppercase; color:var(--text);
}
.lhero-meta {
  font-size:11px; font-weight:400; color:var(--text2);
  letter-spacing:.12em; text-transform:uppercase; margin-top:8px;
}
.lhero-meta strong { color:var(--blue); font-weight:500; }

/* ═══════════════════════════════════════
   STAT CARDS
═══════════════════════════════════════ */
.stats { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:20px; }

.stat {
  background:var(--s1); border:1px solid var(--b1);
  padding:16px 20px; position:relative; overflow:hidden;
}
.stat::before {
  content:''; position:absolute; bottom:0; left:0;
  width:30%; height:1px; background:var(--blue); opacity:.35;
}
.stat-l { font-size:9px; font-weight:600; letter-spacing:.22em; text-transform:uppercase; color:var(--text3); margin-bottom:6px; }
.stat-v { font-family:'Syne',sans-serif; font-weight:800; font-size:34px; letter-spacing:.02em; color:var(--text); }

/* ═══════════════════════════════════════
   TABLE
═══════════════════════════════════════ */
.tbl { background:var(--s1); border:1px solid var(--b1); overflow:hidden; }

.th-row {
  display:grid; grid-template-columns: 52px 1fr 108px 84px 108px;
  padding:11px 22px; background:var(--ink3); border-bottom:1px solid var(--b1);
}
.th {
  font-size:9px; font-weight:600; letter-spacing:.22em; text-transform:uppercase;
  color:var(--text3);
}
.th.r { text-align:right; }

.trow {
  display:grid; grid-template-columns: 52px 1fr 108px 84px 108px;
  padding:14px 22px; border-bottom:1px solid var(--b1);
  align-items:center;
  transition: background .14s var(--ease);
  animation: rowSlide .3s var(--ease) both;
}
.trow:last-child { border-bottom:none; }
.trow:hover { background:rgba(255,255,255,.018); }

@keyframes rowSlide {
  from { opacity:0; transform:translateX(-6px); }
  to   { opacity:1; transform:translateX(0); }
}

.trow.p1 { border-left:2px solid var(--gold);   background:rgba(226,185,74,.03); }
.trow.p2 { border-left:2px solid var(--silver);  background:rgba(159,176,204,.02); }
.trow.p3 { border-left:2px solid var(--bronze); }

.rank {
  font-family:'Syne',sans-serif; font-weight:700; font-size:18px;
  color:var(--text3);
}
.rank.p1 { color:var(--gold); }
.rank.p2 { color:var(--silver); }
.rank.p3 { color:var(--bronze); }

.pcell { display:flex; align-items:center; gap:12px; }

.av {
  width:34px; height:34px; border-radius:50%; flex-shrink:0;
  background:var(--s2); border:1px solid var(--b2);
  display:flex; align-items:center; justify-content:center; overflow:hidden;
}
.av-init {
  font-family:'Syne',sans-serif; font-weight:700; font-size:12px; color:var(--text3);
  text-transform:uppercase;
}
.av img { width:100%; height:100%; object-fit:cover; display:block; }

.pname { font-size:13px; font-weight:500; color:var(--text); line-height:1; }
.pid   { font-size:9px; color:var(--text3); margin-top:3px; letter-spacing:.05em; }

.num { text-align:right; font-size:13px; font-weight:400; color:var(--text2); }
.num.pts {
  font-family:'Syne',sans-serif; font-weight:700; font-size:17px;
  color:var(--blue);
}
.num.wins { color:var(--text); }

/* skeleton rows */
.sk-row {
  display:grid; grid-template-columns: 52px 1fr 108px 84px 108px;
  padding:14px 22px; border-bottom:1px solid var(--b1); align-items:center;
}
.sk { background:var(--s2); border-radius:2px; position:relative; overflow:hidden; }
.sk::after {
  content:''; position:absolute; inset:0;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.04),transparent);
  background-size:200% 100%;
  animation:shimmer 1.6s ease-in-out infinite;
}
@keyframes shimmer { from{background-position:200% 0} to{background-position:-200% 0} }
.sk-rk  { width:22px; height:18px; }
.sk-nm  { width:52%; height:12px; }
.sk-n   { width:36px; height:12px; margin-left:auto; }
.sk-av  { width:34px; height:34px; border-radius:50%; }

/* empty */
.empty {
  padding:72px 24px; text-align:center;
  display:flex; flex-direction:column; align-items:center; gap:10px;
}
.empty-t {
  font-family:'Syne',sans-serif; font-weight:700; font-size:20px;
  letter-spacing:.06em; text-transform:uppercase; color:var(--text3);
}
.empty-s { font-size:11px; color:var(--text3); letter-spacing:.08em; }

/* timestamp */
.ts { text-align:right; margin-top:10px; font-size:9px; letter-spacing:.14em; text-transform:uppercase; color:var(--text3); }

/* ═══════════════════════════════════════
   FOOTER
═══════════════════════════════════════ */
.foot { border-top:1px solid var(--b1); margin-top:64px; padding:22px 36px; }
.foot-inner {
  max-width:1100px; margin:0 auto;
  display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px;
}
.foot-t { font-size:9px; letter-spacing:.16em; text-transform:uppercase; color:var(--text3); }

/* ═══════════════════════════════════════
   MODAL
═══════════════════════════════════════ */
.overlay {
  position:fixed; inset:0; z-index:500;
  background:rgba(8,9,16,.75); backdrop-filter:blur(12px);
  display:flex; align-items:center; justify-content:center;
  opacity:0; pointer-events:none;
  transition:opacity .22s var(--ease);
}
.overlay.open { opacity:1; pointer-events:all; }

.modal {
  background:var(--s1); border:1px solid var(--b2);
  padding:36px 32px; width:340px;
  transform:translateY(12px) scale(.97);
  transition:transform .28s var(--spring);
  box-shadow:0 32px 80px rgba(0,0,0,.55);
}
.overlay.open .modal { transform:translateY(0) scale(1); }

.modal-title {
  font-family:'Syne',sans-serif; font-weight:800; font-size:26px;
  letter-spacing:.06em; text-transform:uppercase; margin-bottom:4px;
}
.modal-sub { font-size:11px; color:var(--text2); margin-bottom:22px; }

.minput {
  width:100%; background:var(--ink3); border:1px solid var(--b2);
  color:var(--text); font-family:'DM Sans',sans-serif;
  font-size:13px; padding:11px 14px; outline:none; margin-bottom:14px;
  transition:border-color .15s;
}
.minput:focus { border-color:rgba(91,127,255,.5); }

.modal-btns { display:flex; gap:8px; margin-top:4px; }
.btn-prim {
  flex:1; background:var(--blue); color:#fff; border:none;
  font-family:'DM Sans',sans-serif; font-size:11px; font-weight:600;
  letter-spacing:.14em; text-transform:uppercase; padding:11px;
  cursor:pointer; transition:opacity .15s;
}
.btn-prim:hover { opacity:.85; }
.btn-sec {
  padding:11px 16px; background:transparent; color:var(--text2);
  border:1px solid var(--b2); cursor:pointer;
  font-family:'DM Sans',sans-serif; font-size:11px; font-weight:500;
  letter-spacing:.14em; text-transform:uppercase;
  transition:color .15s, border-color .15s;
}
.btn-sec:hover { color:var(--text); border-color:var(--b3); }

.err { font-size:10px; color:#e05; margin-bottom:10px; display:none; }

/* ═══════════════════════════════════════
   RESPONSIVE
═══════════════════════════════════════ */
@media(max-width:680px){
  .topbar-inner, .wrap, .foot { padding-left:18px; padding-right:18px; }
  .admin-bar-inner { padding-left:18px; padding-right:18px; }
  .th-row,.trow { grid-template-columns:42px 1fr 88px; }
  .th-row .th:nth-child(4),.th-row .th:nth-child(5),
  .trow   .num:nth-child(4),.trow .num:nth-child(5) { display:none; }
  .sk-row { grid-template-columns:42px 1fr 88px; }
  .sk-row .sk:nth-child(4),.sk-row .sk:nth-child(5) { display:none; }
  .stats { grid-template-columns:1fr 1fr; }
  .stat:last-child { grid-column:1/-1; }
  #leagueGrid { grid-template-columns:repeat(auto-fill,minmax(120px,1fr)); }
  .lhero { flex-wrap:wrap; gap:14px; }
}
</style>
</head>
<body>

<!-- LOGIN MODAL -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-title">Admin</div>
    <div class="modal-sub">Enter password to access controls</div>
    <input class="minput" type="password" id="adminPw" placeholder="Password">
    <div class="err" id="loginErr">Incorrect password</div>
    <div class="modal-btns">
      <button class="btn-prim" onclick="doLogin()">Login</button>
      <button class="btn-sec"  onclick="closeModal()">Cancel</button>
    </div>
  </div>
</div>

<div class="z">

<!-- TOPBAR -->
<nav class="topbar">
  <div class="topbar-inner">
    <div class="brand">
      <div class="brand-mark">
        <svg viewBox="0 0 16 16"><path d="M8 1L15 4.5V11.5L8 15L1 11.5V4.5L8 1Z"/></svg>
      </div>
      <span class="brand-name">Pugs<em>Board</em></span>
    </div>
    <div class="topbar-right">
      <div class="chip" style="cursor:default;pointer-events:none">
        <div class="live-dot"></div>
        Live
      </div>
      <button class="chip" id="adminBtn" onclick="openModal()">Admin</button>
      <button class="chip danger" id="logoutBtn" style="display:none" onclick="doLogout()">Logout</button>
    </div>
  </div>
</nav>

<!-- ADMIN BAR -->
<div class="admin-bar" id="adminBar">
  <div class="admin-bar-inner">

    <div class="admin-section-label">Global Settings</div>
    <div class="admin-row">
      <div class="afield">
        <label>Site Logo URL</label>
        <input class="ainput" id="gLogoUrl" type="text" placeholder="https://...">
      </div>
      <div class="afield" style="flex:0 0 auto;gap:10px;">
        <label>Size</label>
        <input class="slider" type="range" id="gLogoSize" min="30" max="120" value="60" oninput="document.getElementById('gSizeVal').textContent=this.value+'px'">
        <span class="slider-val" id="gSizeVal">60px</span>
      </div>
      <button class="btn-save" onclick="saveGlobal()">Save</button>
    </div>

    <div id="leagueAdminRow" style="display:none">
      <div class="admin-section-label" style="margin-top:8px">League — <span id="adminLeagueName" style="text-transform:uppercase;color:var(--text2)"></span></div>
      <div class="admin-row">
        <div class="afield">
          <label>Display Name</label>
          <input class="ainput" id="lName" type="text" placeholder="League name">
        </div>
        <div class="afield">
          <label>Logo URL</label>
          <input class="ainput" id="lLogoUrl" type="text" placeholder="https://...">
        </div>
        <div class="afield" style="flex:0 0 auto;gap:10px;">
          <label>Size</label>
          <input class="slider" type="range" id="lLogoSize" min="30" max="120" value="60" oninput="document.getElementById('lSizeVal').textContent=this.value+'px'">
          <span class="slider-val" id="lSizeVal">60px</span>
        </div>
        <button class="btn-save" onclick="saveLeague()">Save</button>
      </div>
    </div>

  </div>
</div>

<!-- MAIN -->
<main class="wrap z">

  <div class="section-head"><span class="section-title">Select League</span><div class="section-line"></div></div>
  <div id="leagueGrid"></div>

  <!-- BOARD -->
  <div id="boardPanel">

    <div class="lhero">
      <div class="lhero-logo" id="heroLogo">
        <span class="lhero-init" id="heroInit">?</span>
      </div>
      <div class="lhero-info">
        <div class="lhero-name" id="heroName">—</div>
        <div class="lhero-meta" id="heroMeta">—</div>
      </div>
    </div>

    <div class="stats">
      <div class="stat"><div class="stat-l">Players</div><div class="stat-v" id="sv-p">—</div></div>
      <div class="stat"><div class="stat-l">Matches</div><div class="stat-v" id="sv-m">—</div></div>
      <div class="stat"><div class="stat-l">Top Score</div><div class="stat-v" id="sv-t">—</div></div>
    </div>

    <div class="section-head" style="margin-bottom:0">
      <span class="section-title">Standings</span><div class="section-line"></div>
    </div>

    <div class="tbl">
      <div class="th-row">
        <div class="th">#</div>
        <div class="th">Player</div>
        <div class="th r">Points</div>
        <div class="th r">Wins</div>
        <div class="th r">Matches</div>
      </div>
      <div id="list"></div>
    </div>

    <div class="ts" id="ts">—</div>
  </div>

</main>

<!-- FOOTER -->
<footer class="foot z">
  <div class="foot-inner">
    <span class="foot-t">PugsBoard — Global Leaderboard</span>
    <span class="foot-t" id="footDate">—</span>
  </div>
</footer>

</div><!-- .z -->

<script>
/* ══════════════════════════════════════════════
   CONFIG
══════════════════════════════════════════════ */
const BIN_ID  = "69e384bc856a6821894966bc";
const API_KEY = "$2a$10$cBWEEkarc94EGoG/iG9AROsEfgwtnGJq.SoIUNH0YKNOzlerJzvam";
const BIN_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;
const ADMIN_PW = "admin123";

/* ══════════════════════════════════════════════
   STATE
══════════════════════════════════════════════ */
let db = {
  players: [], logo: "", logoSize: 60,
  leagueLogos: {}, leagueLogoSizes: {}, leagueNames: {}
};
let leagues      = [];
let activeId     = null;
let isAdmin      = false;

/* ══════════════════════════════════════════════
   API
══════════════════════════════════════════════ */
async function fetchDB() {
  try {
    const res  = await fetch(`${BIN_URL}/latest`, { headers:{"X-Master-Key":API_KEY} });
    if (!res.ok) throw new Error();
    const json = await res.json();
    db = Object.assign({ players:[], logo:"", logoSize:60, leagueLogos:{}, leagueLogoSizes:{}, leagueNames:{} }, json.record);
    buildLeagues();
    renderGrid();
    if (activeId && leagues.find(l=>l.id===activeId)) renderBoard(activeId);
  } catch {
    document.getElementById("leagueGrid").innerHTML =
      `<div style="grid-column:1/-1;padding:48px;text-align:center;font-size:11px;letter-spacing:.12em;color:var(--text3)">Connection error — retrying</div>`;
  }
}

async function writeDB() {
  await fetch(BIN_URL, {
    method:"PUT",
    headers:{"Content-Type":"application/json","X-Master-Key":API_KEY},
    body: JSON.stringify(db)
  });
}

/* ══════════════════════════════════════════════
   BUILD LEAGUES
══════════════════════════════════════════════ */
function buildLeagues() {
  const map = new Map();
  for (const p of db.players) {
    if (!p.guildId) continue;
    if (!map.has(p.guildId)) map.set(p.guildId, { id:p.guildId, rawName:p.guildName||p.guildId, count:0 });
    map.get(p.guildId).count++;
  }
  leagues = [...map.values()].sort((a,b)=>b.count-a.count);
}

/* ══════════════════════════════════════════════
   LEAGUE GRID
══════════════════════════════════════════════ */
function renderGrid() {
  const el = document.getElementById("leagueGrid");
  if (!leagues.length) {
    el.innerHTML = `<div style="grid-column:1/-1;padding:60px;text-align:center">
      <div class="empty-t">No Leagues Yet</div>
      <div class="empty-s" style="margin-top:8px">Play a match to see data here</div>
    </div>`;
    return;
  }

  el.innerHTML = leagues.map(l => {
    const displayName = db.leagueNames[l.id] || l.rawName;
    const logo   = db.leagueLogos[l.id] || "";
    const sz     = db.leagueLogoSizes[l.id] || 64;
    const init   = displayName.slice(0,2).toUpperCase();
    const active = l.id === activeId ? "active" : "";

    const logoHtml = logo
      ? `<img src="${esc(logo)}" alt="" style="width:100%;height:100%;object-fit:cover;display:block;"
              onerror="this.parentElement.innerHTML='<span class=lc-init style=font-size:${Math.round(sz*.3)}px>${init}</span>'">`
      : `<span class="lc-init" style="font-size:${Math.round(sz*.3)}px">${init}</span>`;

    return `<button class="league-card ${active}" onclick="selectLeague('${esc(l.id)}')" title="${esc(displayName)}">
      <div class="lc-logo" style="width:${sz}px;height:${sz}px">${logoHtml}</div>
      <div class="lc-name">${esc(displayName)}</div>
      <div class="lc-meta">${l.count} player${l.count!==1?'s':''}</div>
    </button>`;
  }).join("");
}

function renderGridSkeleton() {
  document.getElementById("leagueGrid").innerHTML =
    Array.from({length:4}, () => `<div class="lc-skel"></div>`).join("");
}

/* ══════════════════════════════════════════════
   SELECT LEAGUE
══════════════════════════════════════════════ */
function selectLeague(id) {
  activeId = id;
  renderGrid();
  if (isAdmin) showLeagueAdmin(id);
  renderBoard(id);
}

/* ══════════════════════════════════════════════
   RENDER BOARD
══════════════════════════════════════════════ */
function renderBoard(guildId) {
  const panel = document.getElementById("boardPanel");
  panel.classList.add("visible");

  const l           = leagues.find(x=>x.id===guildId);
  const displayName = db.leagueNames[guildId] || (l ? l.rawName : guildId);
  const init        = displayName.slice(0,2).toUpperCase();
  const logo        = db.leagueLogos[guildId] || db.logo || "";
  const logoSz      = db.leagueLogoSizes[guildId] || db.logoSize || 64;

  // hero logo
  const heroLogo = document.getElementById("heroLogo");
  heroLogo.style.width  = logoSz + "px";
  heroLogo.style.height = logoSz + "px";
  if (logo) {
    const img = document.createElement("img");
    img.src = logo; img.alt = "";
    img.style.cssText = "width:100%;height:100%;object-fit:cover;display:block";
    img.onerror = () => { heroLogo.innerHTML = `<span class="lhero-init" style="font-size:${Math.round(logoSz*.3)}px">${init}</span>`; };
    heroLogo.innerHTML = ""; heroLogo.appendChild(img);
  } else {
    heroLogo.innerHTML = `<span class="lhero-init" style="font-size:${Math.round(logoSz*.3)}px">${init}</span>`;
  }

  document.getElementById("heroName").textContent = displayName;
  document.getElementById("heroInit").textContent  = init;

  const players = db.players.filter(p=>p.guildId===guildId).sort((a,b)=>b.points-a.points);
  const totalM  = Math.floor(players.reduce((s,p)=>s+(p.matches||0),0)/2);

  document.getElementById("heroMeta").innerHTML =
    `<strong>${players.length}</strong> players &nbsp;&middot;&nbsp; <strong>${totalM}</strong> matches`;
  document.getElementById("sv-p").textContent = players.length;
  document.getElementById("sv-m").textContent = totalM;
  document.getElementById("sv-t").textContent = players[0]?.points ?? 0;

  const list = document.getElementById("list");
  if (!players.length) {
    list.innerHTML = `<div class="empty"><div class="empty-t">No Players Yet</div><div class="empty-s">Matches will populate this board</div></div>`;
    document.getElementById("ts").textContent = "";
    return;
  }

  list.innerHTML = players.map((p,i) => {
    const rank  = i+1;
    const pc    = rank<=3?`p${rank}`:"";
    const init2 = (p.displayName||"?").slice(0,2).toUpperCase();
    return `<div class="trow ${pc}" style="animation-delay:${(i*.038).toFixed(3)}s">
      <div class="rank ${pc}">${rank}</div>
      <div class="pcell">
        <div class="av"><span class="av-init">${init2}</span></div>
        <div>
          <div class="pname">${esc(p.displayName||"Unknown")}</div>
          <div class="pid">${esc(p.userId)}</div>
        </div>
      </div>
      <div class="num pts">${p.points??0}</div>
      <div class="num wins">${p.wins??0}</div>
      <div class="num">${p.matches??0}</div>
    </div>`;
  }).join("");

  const now = new Date();
  document.getElementById("ts").textContent =
    "Updated " + now.toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"});
  document.getElementById("footDate").textContent =
    now.toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"});

  setTimeout(() => panel.scrollIntoView({behavior:"smooth",block:"nearest"}), 80);
}

/* ══════════════════════════════════════════════
   ADMIN — MODAL
══════════════════════════════════════════════ */
function openModal() {
  document.getElementById("overlay").classList.add("open");
  setTimeout(() => document.getElementById("adminPw").focus(), 60);
}
function closeModal() {
  document.getElementById("overlay").classList.remove("open");
  document.getElementById("adminPw").value = "";
  document.getElementById("loginErr").style.display = "none";
}
function doLogin() {
  if (document.getElementById("adminPw").value === ADMIN_PW) {
    isAdmin = true; closeModal();
    document.getElementById("adminBar").classList.add("open");
    document.getElementById("adminBtn").style.display = "none";
    document.getElementById("logoutBtn").style.display = "";
    document.getElementById("gLogoUrl").value  = db.logo||"";
    document.getElementById("gLogoSize").value = db.logoSize||60;
    document.getElementById("gSizeVal").textContent = (db.logoSize||60)+"px";
    if (activeId) showLeagueAdmin(activeId);
  } else {
    document.getElementById("loginErr").style.display = "block";
  }
}
function doLogout() {
  isAdmin = false;
  document.getElementById("adminBar").classList.remove("open");
  document.getElementById("adminBtn").style.display = "";
  document.getElementById("logoutBtn").style.display = "none";
  document.getElementById("leagueAdminRow").style.display = "none";
}

/* ══════════════════════════════════════════════
   ADMIN — LEAGUE CONTROLS
══════════════════════════════════════════════ */
function showLeagueAdmin(id) {
  const l = leagues.find(x=>x.id===id);
  if (!l) return;
  const displayName = db.leagueNames[id] || l.rawName;
  document.getElementById("leagueAdminRow").style.display = "";
  document.getElementById("adminLeagueName").textContent  = displayName;
  document.getElementById("lName").value       = displayName;
  document.getElementById("lLogoUrl").value    = db.leagueLogos[id]||"";
  const sz = db.leagueLogoSizes[id]||64;
  document.getElementById("lLogoSize").value   = sz;
  document.getElementById("lSizeVal").textContent = sz+"px";
}

/* ══════════════════════════════════════════════
   ADMIN — SAVE
══════════════════════════════════════════════ */
async function saveGlobal() {
  db.logo     = document.getElementById("gLogoUrl").value.trim();
  db.logoSize = +document.getElementById("gLogoSize").value;
  await writeDB();
  if (activeId) renderBoard(activeId);
  renderGrid();
}

async function saveLeague() {
  if (!activeId) return;
  const name = document.getElementById("lName").value.trim();
  const logo  = document.getElementById("lLogoUrl").value.trim();
  const sz    = +document.getElementById("lLogoSize").value;
  if (name) db.leagueNames[activeId] = name;
  db.leagueLogos[activeId]     = logo;
  db.leagueLogoSizes[activeId] = sz;
  await writeDB();
  buildLeagues();
  renderGrid();
  if (activeId) {
    showLeagueAdmin(activeId);
    renderBoard(activeId);
  }
}

/* ══════════════════════════════════════════════
   UTIL
══════════════════════════════════════════════ */
function esc(s) {
  return String(s)
    .replace(/&/g,"&amp;").replace(/</g,"&lt;")
    .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

/* ══════════════════════════════════════════════
   EVENTS
══════════════════════════════════════════════ */
document.getElementById("adminPw").addEventListener("keydown", e => { if (e.key==="Enter") doLogin(); });
document.getElementById("overlay").addEventListener("click", e => { if (e.target===document.getElementById("overlay")) closeModal(); });

/* ══════════════════════════════════════════════
   INIT
══════════════════════════════════════════════ */
renderGridSkeleton();
fetchDB();
setInterval(fetchDB, 30000);

document.getElementById("footDate").textContent =
  new Date().toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"});
</script>
</body>
</html>
